name: Mirror to LUC-AI4FM/webpage

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push mirror
        run: |
          git remote add mirror https://arslanbisharat:${{ secrets.MIRROR_PAT }}@github.com/LUC-AI4FM/webpage.git
          git push mirror main --force 2>&1 || (echo "Push failed with exit $?" && git remote -v && exit 1)
